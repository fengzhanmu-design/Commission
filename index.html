<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>股票成本助手 V1.4</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#dbe4e9">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --morandi-blue: #a3c4dc;
            --morandi-text-main: #3d5059;
            --morandi-text-sub: #7b909a;
            --morandi-accent: #8e7cc3; 
            --morandi-up: #bf8d8e; 
            --morandi-down: #8ba99b; 
            
            --bg-gradient: linear-gradient(135deg, #e3ebf0 0%, #f4f6f8 40%, #e2d9dd 100%);
            --card-bg: rgba(255, 255, 255, 0.45);
            --input-bg: rgba(255, 255, 255, 0.6);
            --stroke: rgba(255, 255, 255, 0.7);
            --shadow-soft: 0 8px 32px rgba(31, 38, 135, 0.05);
            --backdrop-blur: blur(15px);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --morandi-text-main: #e2e8f0;
                --morandi-text-sub: #94a3b8;
                --morandi-accent: #a894e2;
                --bg-gradient: linear-gradient(135deg, #18202c 0%, #222b38 50%, #2a2333 100%);
                --card-bg: rgba(30, 41, 59, 0.4);
                --input-bg: rgba(15, 23, 42, 0.4);
                --stroke: rgba(255, 255, 255, 0.1);
                --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.2);
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient); 
            background-attachment: fixed; 
            color: var(--morandi-text-main);
            margin: 0; padding: 25px 20px 40px 20px;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: flex-start;
        }

        .main-container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 18px; }

        .glass {
            background: var(--card-bg); 
            backdrop-filter: var(--backdrop-blur); 
            -webkit-backdrop-filter: var(--backdrop-blur);
            border: 1px solid var(--stroke); 
            border-radius: 20px;
            padding: 22px;
            box-shadow: var(--shadow-soft);
        }

        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; padding-left: 5px; }
        .header i { font-size: 24px; color: var(--morandi-accent); }
        .header h2 { margin: 0; font-weight: 700; font-size: 1.4rem; color: var(--morandi-text-main); }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; color: var(--morandi-text-sub); margin-bottom: 8px; font-weight: 500; }
        input {
            width: 100%; padding: 14px 16px; border-radius: 12px;
            border: 1px solid var(--stroke);
            background: var(--input-bg); color: var(--morandi-text-main);
            font-size: 1.05rem; font-weight: 600; outline: none;
            transition: border 0.3s;
        }
        input:focus { border-color: var(--morandi-accent); }
        input::placeholder { color: rgba(123, 144, 154, 0.5); font-weight: 400; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .res-card { text-align: center; padding: 18px; }
        .res-label { font-size: 0.75rem; color: var(--morandi-text-sub); margin-bottom: 6px; font-weight: 500; }
        .res-value { font-size: 1.3rem; font-weight: 800; color: var(--morandi-text-main); }
        .sub-res { font-size: 0.8rem; margin-top: 6px; color: var(--morandi-text-sub); font-weight: 500; }
        
        .res-card.highlight { border: 2px solid var(--morandi-accent); background: rgba(142, 124, 195, 0.05); }
        .highlight .res-label, .highlight .res-value { color: var(--morandi-accent); }

        .fees-list { font-size: 0.8rem; color: var(--morandi-text-sub); line-height: 2.2; }
        .fees-item { display: flex; justify-content: space-between; }
        .fees-item span:last-child { color: var(--morandi-text-main); font-weight: 700; }
        hr { border: none; border-top: 1px dashed var(--stroke); margin: 15px 0; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <i class="fas fa-chart-line"></i>
        <h2>股票成本助手</h2>
    </div>

    <div class="glass">
        <div class="input-group">
            <label>买入单价 (元)</label>
            <input type="text" inputmode="decimal" id="buyPrice" placeholder="请输入买入单价" oninput="calc()" onchange="calc()" onkeyup="calc()">
        </div>
        <div class="grid">
            <div class="input-group">
                <label>股票数量 (股)</label>
                <input type="text" inputmode="numeric" id="qty" placeholder="输入数量" oninput="calc()" onchange="calc()" onkeyup="calc()">
            </div>
            <div class="input-group">
                <label>佣金率 (%)</label>
                <input type="text" inputmode="decimal" id="commRate" value="0.02" oninput="calc()" onchange="calc()" onkeyup="calc()">
            </div>
        </div>
        <div class="input-group" style="margin-bottom:0;">
            <label>预期卖出价 (元) - 可选</label>
            <input type="text" inputmode="decimal" id="sellPrice" placeholder="不填则仅计算保本" oninput="calc()" onchange="calc()" onkeyup="calc()">
        </div>
    </div>

    <div class="grid">
        <div class="glass res-card highlight">
            <div class="res-label">保本卖出预期价格</div>
            <div id="breakEven" class="res-value">0.000</div>
        </div>
        <div class="glass res-card highlight">
            <div class="res-label">保本涨幅</div>
            <div id="breakPercent" class="res-value">0.00%</div>
        </div>
    </div>

    <div class="glass res-card">
        <div class="res-label">预计净利润</div>
        <div id="netProfit" class="res-value">0.00</div>
        <div id="profitPerShare" class="sub-res">每股净赚: 0.000</div>
    </div>

    <div class="glass">
        <div class="res-label" style="margin-bottom: 10px;">税费支出明细</div>
        <div class="fees-list" id="feesDetail">
            <div style="text-align:center; padding: 10px 0;">请输入买入单价和数量查看</div>
        </div>
    </div>
</div>

<script>
    // 强制清除旧缓存，确保更新生效
    if ('caches' in window) {
        caches.keys().then(keys => {
            keys.forEach(key => caches.delete(key));
        });
    }

    function calc() {
        // 安全提取数据，处理可能的中文逗号或空格
        const parseVal = (id) => parseFloat(document.getElementById(id).value.replace(/,/g, '')) || 0;
        
        const P_buy = parseVal('buyPrice');
        const qty = parseVal('qty');
        const P_sell = parseVal('sellPrice');
        const rate = parseVal('commRate') / 100;

        const bePriceEl = document.getElementById('breakEven');
        const bePercentEl = document.getElementById('breakPercent');
        const npEl = document.getElementById('netProfit');
        const ppsEl = document.getElementById('profitPerShare');
        const feesEl = document.getElementById('feesDetail');

        if (P_buy <= 0 || qty <= 0) {
            const emptyVal = '0.000';
            bePriceEl.innerText = emptyVal; bePercentEl.innerText = '0.00%';
            npEl.innerText = '0.00'; npEl.style.color = 'var(--morandi-text-main)';
            ppsEl.innerText = `每股净赚: ${emptyVal}`;
            feesEl.innerHTML = '<div style="text-align:center; padding: 10px 0;">请输入买入单价和数量查看</div>';
            return;
        }

        const buyAmt = P_buy * qty;
        const buyComm = Math.max(buyAmt * rate, 5); 
        const buyTrans = buyAmt * 0.00001; 
        const totalBuyCost = buyAmt + buyComm + buyTrans;

        let bePrice = P_buy * 1.001; 
        for(let i=0; i<5; i++) {
            let sCommGuess = Math.max(bePrice * qty * rate, 5);
            bePrice = (totalBuyCost + sCommGuess) / (qty * (1 - 0.00001 - 0.0005));
        }

        bePriceEl.innerText = bePrice.toFixed(3);
        const beInc = ((bePrice - P_buy) / P_buy * 100);
        bePercentEl.innerText = beInc.toFixed(2) + '%';

        if (P_sell > 0) {
            const sellAmt = P_sell * qty;
            const sellComm = Math.max(sellAmt * rate, 5);
            const sellTrans = sellAmt * 0.00001;
            const sellStamp = sellAmt * 0.0005; 
            const totalSellNet = sellAmt - sellComm - sellTrans - sellStamp;

            const profit = totalSellNet - totalBuyCost;
            
            npEl.innerText = (profit >= 0 ? '+' : '') + profit.toFixed(2);
            npEl.style.color = profit >= 0 ? 'var(--morandi-up)' : 'var(--morandi-down)';
            ppsEl.innerText = `每股净赚: ${(profit/qty).toFixed(3)}`;

            feesEl.innerHTML = `
                <div class="fees-item"><span>买入佣金(保5)</span><span>${buyComm.toFixed(2)}</span></div>
                <div class="fees-item"><span>买入过户费</span><span>${buyTrans.toFixed(2)}</span></div>
                <hr>
                <div class="fees-item"><span>卖出佣金(保5)</span><span>${sellComm.toFixed(2)}</span></div>
                <div class="fees-item"><span>卖出过户费</span><span>${sellTrans.toFixed(2)}</span></div>
                <div class="fees-item"><span>卖出印花税</span><span>${sellStamp.toFixed(2)}</span></div>
                <div class="fees-item" style="margin-top:5px; font-weight:700; color:var(--morandi-text-main)">
                    <span>总税费支出</span><span>${(buyComm+buyTrans+sellComm+sellTrans+sellStamp).toFixed(2)}</span>
                </div>
            `;
        } else {
            npEl.innerText = '0.00'; npEl.style.color = 'var(--morandi-text-main)';
            ppsEl.innerText = `每股净赚: 0.000`;
            feesEl.innerHTML = `
                <div class="fees-item"><span>买入佣金(保5)</span><span>${buyComm.toFixed(2)}</span></div>
                <div class="fees-item"><span>买入过户费</span><span>${buyTrans.toFixed(2)}</span></div>
                <hr>
                <div style="text-align:center; padding: 10px 0;">输入预期卖出价查看完整明细</div>
            `;
        }
    }
    
    calc(); 
</script>
</body>
</html>
